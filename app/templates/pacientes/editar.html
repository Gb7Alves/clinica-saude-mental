{% extends "base.html" %}

{% block title %}Editar Paciente - Clínica de Saúde Mental{% endblock %}

{% block content %}
<h2>Editar Paciente</h2>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input type="text" id="nome" name="nome" value="{{ paciente.nome }}" required>
        </div>
        
        <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" value="{{ paciente.cpf }}" required>
        </div>
        
        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento *</label>
            <input type="date" id="data_nascimento" name="data_nascimento" value="{{ paciente.data_nascimento }}" required>
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" value="{{ paciente.telefone }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ paciente.email or '' }}">
        </div>
        
        <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco" value="{{ paciente.endereco or '' }}">
        </div>
        
        <div class="form-group">
            <label for="historico_medico">Histórico Médico</label>
            <textarea id="historico_medico" name="historico_medico">{{ paciente.historico_medico or '' }}</textarea>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('pacientes.ver_paciente', id=paciente.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
        </div>
    </form>
</div>
{% endblock %}
